apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

# The version in the URL below is substituted at deploy time by init.sh using the
# --version flag. Do not bump the version here directly — update the callers in
# .devcontainer/**/post-create.sh instead.
resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.2.0/manifests/install.yaml

patches:
  - path: overlays/argocd-server-service.yaml
  - path: overlays/argocd-cm.yaml
  - path: overlays/argocd-rbac-cm.yaml
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --insecure
    target:
      group: apps
      version: v1
      kind: Deployment
      name: argocd-server